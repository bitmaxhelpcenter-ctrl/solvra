<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solvra — Market Rates</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #0D1B4B;
      --blue: #1A2FCC;
      --blue-light: #EEF0FF;
      --green: #22C55E;
      --red: #EF4444;
      --bg: #F4F5FB;
      --white: #FFFFFF;
      --border: #E2E5F0;
      --muted: #8A91A8;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--navy);
      padding: 20px;
      -webkit-font-smoothing: antialiased;
    }

    .header-nav {
      max-width: 800px;
      margin: 0 auto 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .back-link {
      text-decoration: none;
      color: var(--blue);
      font-weight: 700;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .main-card {
      max-width: 800px;
      margin: 0 auto;
      background: var(--white);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 10px 25px rgba(13, 27, 75, 0.05);
    }

    .title-section {
      margin-bottom: 32px;
    }

    .title-section h1 {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .title-section p {
      color: var(--muted);
      font-size: 15px;
    }

    .stats-bar {
      display: flex;
      gap: 20px;
      margin-bottom: 32px;
      padding: 16px;
      background: var(--bg);
      border-radius: 16px;
    }

    .stat-item {
      flex: 1;
    }

    .stat-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 4px;
    }

    .stat-value {
      font-weight: 700;
      font-size: 15px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      text-align: left;
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 16px 0;
      border-bottom: 1px solid #F0F2F8;
    }

    .asset-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .asset-logo {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--navy);
      color: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 14px;
    }

    .asset-name { font-weight: 700; font-size: 15px; }
    .asset-ticker { font-size: 12px; color: var(--muted); display: block; }

    .price-col { font-weight: 700; font-size: 15px; text-align: right; }
    
    .change-col { text-align: right; }
    .change-pill {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
    }

    .up { background: #E6F9F0; color: var(--green); }
    .down { background: #FEE2E2; color: var(--red); }

    @media (max-width: 600px) {
      .hide-mobile { display: none; }
      .main-card { padding: 20px; }
    }
  </style>
</head>
<body>

  <div class="header-nav">
    <a href="index.html" class="back-link">← Back to Solvra</a>
    <div id="last-update" style="font-size: 12px; color: var(--muted);">Live Updates</div>
  </div>

  <div class="main-card">
    <div class="title-section">
      <h1>Market Rates</h1>
      <p>Real-time exchange rates for your assets.</p>
    </div>

    <div class="stats-bar">
      <div class="stat-item">
        <div class="stat-label">Market Status</div>
        <div class="stat-value" style="color: var(--green);">● Open</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">Global Volatility</div>
        <div class="stat-value">Low (1.1%)</div>
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th>Asset</th>
          <th style="text-align: right;">Price</th>
          <th style="text-align: right;" class="hide-mobile">24h Change</th>
        </tr>
      </thead>
      <tbody id="rates-body">
        </tbody>
    </table>
  </div>

  <script>
    const assets = [
      { id: 'btc', name: 'Bitcoin', ticker: 'BTC', price: 67890.88, change: 2.35, color: '#F7931A', icon: '₿' },
      { id: 'eth', name: 'Ethereum', ticker: 'ETH', price: 3515.01, change: 1.45, color: '#627EEA', icon: 'Ξ' },
      { id: 'usdt', name: 'Tether', ticker: 'USDT', price: 1.00, change: 0.01, color: '#26A17B', icon: '₮' },
      { id: 'sol', name: 'Solana', ticker: 'SOL', price: 152.74, change: 3.02, color: '#1A1A2E', icon: '◎' },
      { id: 'ada', name: 'Cardano', ticker: 'ADA', price: 0.45, change: -1.20, color: '#0033AD', icon: '₳' },
      { id: 'eur', name: 'Euro', ticker: 'EUR/USD', price: 1.08, change: 0.05, color: '#003399', icon: '€' },
      { id: 'gbp', name: 'Pound', ticker: 'GBP/USD', price: 1.26, change: -0.12, color: '#CF142B', icon: '£' },
      { id: 'jpy', name: 'Yen', ticker: 'JPY/USD', price: 0.0064, change: 0.22, color: '#BC002D', icon: '¥' },
      { id: 'cad', name: 'Canadian Dollar', ticker: 'CAD/USD', price: 0.73, change: -0.08, color: '#FF0000', icon: '$' }
    ];

    function renderRates() {
      const tbody = document.getElementById('rates-body');
      tbody.innerHTML = assets.map(asset => `
        <tr>
          <td>
            <div class="asset-info">
              <div class="asset-logo" style="background: ${asset.color}">${asset.icon}</div>
              <div>
                <span class="asset-name">${asset.name}</span>
                <span class="asset-ticker">${asset.ticker}</span>
              </div>
            </div>
          </td>
          <td class="price-col">
            $${asset.price.toLocaleString(undefined, { 
              minimumFractionDigits: asset.price < 1 ? 4 : 2, 
              maximumFractionDigits: asset.price < 1 ? 4 : 2 
            })}
          </td>
          <td class="change-col hide-mobile">
            <span class="change-pill ${asset.change >= 0 ? 'up' : 'down'}">
              ${asset.change >= 0 ? '+' : ''}${asset.change.toFixed(2)}%
            </span>
          </td>
        </tr>
      `).join('');
    }

    function updatePrices() {
      assets.forEach(asset => {
        const movement = (Math.random() - 0.495) * (asset.price * 0.001);
        asset.price += movement;
        asset.change += (Math.random() - 0.5) * 0.08;
      });
      renderRates();
      document.getElementById('last-update').textContent = 'Last update: ' + new Date().toLocaleTimeString();
    }

    renderRates();
    setInterval(updatePrices, 3000);
  </script>

</body>
</html>
