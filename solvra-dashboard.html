<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solvra Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue:       #1B3FEE;
            --blue-mid:   #3b5bdb;
            --blue-light: #4c6ef5;
            --green:      #22c55e;
            --green-dark: #16a34a;
            --red:        #ef4444;
            --red-dark:   #dc2626;
            --amber:      #f59e0b;
            --bg:         #ecf0fc;
            --surface:    #ffffff;
            --surface2:   #f5f7ff;
            --border:     #e2e8ff;
            --border2:    #c7d2fe;
            --text:       #0b1437;
            --text2:      #3d4d7a;
            --text3:      #8896c0;
            --rx:         22px;
            --rl:         16px;
            --rm:         11px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* ── Animated mesh background ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 70% 55% at 10% -5%,  rgba(76,110,245,0.14) 0%, transparent 60%),
                radial-gradient(ellipse 55% 45% at 90% 90%,  rgba(99,102,241,0.11) 0%, transparent 60%),
                radial-gradient(ellipse 40% 35% at 50% 45%,  rgba(27,63,238,0.06)  0%, transparent 55%);
            pointer-events: none;
            z-index: 0;
        }

        /* Floating orbs */
        .orb { position:fixed; border-radius:50%; pointer-events:none; z-index:0; filter:blur(72px); }
        .orb-1 { width:280px;height:280px; background:radial-gradient(circle,rgba(76,110,245,0.17),transparent 70%); top:-90px;left:-90px; animation:orbDrift 15s ease-in-out infinite; }
        .orb-2 { width:220px;height:220px; background:radial-gradient(circle,rgba(99,102,241,0.13),transparent 70%); bottom:3%;right:-60px; animation:orbDrift 15s ease-in-out infinite; animation-delay:-7s; }
        @keyframes orbDrift { 0%,100%{transform:translateY(0)scale(1)} 40%{transform:translateY(-22px)scale(1.05)} 70%{transform:translateY(15px)scale(0.97)} }

        /* ── Container ── */
        .container { width:100%; max-width:420px; min-height:100vh; padding:20px 16px 56px; position:relative; overflow-x:hidden; z-index:1; }

        /* ── Header ── */
        .header {
            display:flex; align-items:center; justify-content:space-between;
            margin-bottom:18px; z-index:10; position:relative;
            animation:fadeDown .5s ease-out both;
        }
        .logo { display:inline-flex; align-items:center; gap:9px; font-size:17px; font-weight:800; color:var(--text); text-decoration:none; letter-spacing:-.3px; }
        .logo-icon { width:30px;height:30px; filter:drop-shadow(0 3px 7px rgba(76,110,245,.35)); }

        .header-right { display:flex; align-items:center; gap:8px; }
        .live-pill { display:inline-flex; align-items:center; gap:6px; background:rgba(34,197,94,.11); border:1px solid rgba(34,197,94,.28); border-radius:20px; padding:5px 11px; font-size:11px; font-weight:700; color:#15803d; }
        .live-dot { width:7px;height:7px; border-radius:50%; background:var(--green); animation:livePulse 1.8s ease-in-out infinite; }
        @keyframes livePulse { 0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(34,197,94,.5)} 50%{opacity:.7;box-shadow:0 0 0 5px rgba(34,197,94,0)} }

        /* ── Welcome ── */
        .welcome { margin-bottom:18px; z-index:1; position:relative; animation:fadeUp .5s .05s both; }
        .welcome h1 { font-size:24px; font-weight:900; color:var(--text); letter-spacing:-.5px; margin-bottom:3px; }
        .welcome p  { font-size:13.5px; color:var(--text3); font-weight:500; }

        /* ── Balance Card ── */
        .balance-card {
            background: linear-gradient(135deg, #1B3FEE 0%, #3b5bdb 50%, #1a38b0 100%);
            border-radius: var(--rx);
            padding: 22px 20px 18px;
            margin-bottom: 14px;
            color: white;
            position: relative;
            overflow: hidden;
            box-shadow: 0 22px 50px rgba(27,63,238,.35), 0 0 0 1px rgba(255,255,255,.12) inset, inset 0 1px 0 rgba(255,255,255,.22);
            animation: fadeUp .6s .1s both;
            z-index:1;
        }
        /* Dot-grid texture */
        .balance-card::before {
            content:''; position:absolute; inset:0;
            background-image: radial-gradient(circle, rgba(255,255,255,.11) 1px, transparent 1px);
            background-size: 18px 18px;
            pointer-events:none;
        }
        /* Shimmer sweep */
        .balance-card::after {
            content:''; position:absolute; top:0; left:-60%; width:50%; height:100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,.09), transparent);
            animation: sweep 8s ease-in-out infinite;
        }
        @keyframes sweep { 0%{left:-60%} 20%{left:110%} 100%{left:110%} }

        .card-glow { position:absolute; top:-40px;right:-40px; width:160px;height:160px; border-radius:50%; background:radial-gradient(circle,rgba(147,197,253,.2) 0%,transparent 70%); pointer-events:none; }

        .balance-header { display:flex; align-items:center; gap:8px; font-size:11px; font-weight:700; color:rgba(255,255,255,.6); margin-bottom:8px; text-transform:uppercase; letter-spacing:.8px; position:relative; z-index:1; }
        .eye-btn { background:rgba(255,255,255,.15); border:none; cursor:pointer; padding:6px; border-radius:8px; color:rgba(255,255,255,.85); display:flex; align-items:center; transition:all .2s ease; backdrop-filter:blur(10px); margin-left:2px; }
        .eye-btn:hover { color:white; background:rgba(255,255,255,.25); transform:scale(1.05); }
        .eye-btn:active { transform:scale(0.95); }

        .balance-amount { font-size:38px; font-weight:900; letter-spacing:-1.5px; min-height:48px; text-shadow:0 2px 10px rgba(0,0,0,.15); transition:all .3s ease; position:relative; z-index:1; margin-bottom:14px; font-family:'JetBrains Mono','Inter',monospace; }

        .balance-meta { display:flex; align-items:flex-end; justify-content:space-between; position:relative; z-index:1; }
        .balance-left {}
        .balance-change { font-size:12px; font-weight:700; color:#86efac; display:inline-flex; align-items:center; gap:4px; background:rgba(34,197,94,.18); border:1px solid rgba(34,197,94,.25); padding:4px 11px; border-radius:20px; backdrop-filter:blur(10px); margin-bottom:6px; }
        .balance-sub { font-size:11px; font-weight:500; color:rgba(255,255,255,.5); margin-top:2px; }

        /* Real sparkline drawn by JS */
        #balanceSparkline { width:140px; height:55px; }

        /* ── Crypto Ticker Strip ── */
        .ticker-wrap { overflow:hidden; margin-bottom:18px; position:relative; z-index:1; animation:fadeUp .5s .15s both; }
        .ticker-wrap::before,.ticker-wrap::after { content:''; position:absolute; top:0; bottom:0; width:24px; z-index:2; pointer-events:none; }
        .ticker-wrap::before { left:0; background:linear-gradient(90deg,var(--bg),transparent); }
        .ticker-wrap::after  { right:0; background:linear-gradient(-90deg,var(--bg),transparent); }
        .ticker-track { display:flex; gap:6px; animation:tickerScroll 32s linear infinite; width:max-content; }
        .ticker-track:hover { animation-play-state:paused; }
        @keyframes tickerScroll { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
        .ticker-item { display:inline-flex; align-items:center; gap:7px; background:var(--surface); border:1.5px solid var(--border); border-radius:10px; padding:7px 12px; white-space:nowrap; flex-shrink:0; }
        .ti-dot { width:6px;height:6px; border-radius:50%; flex-shrink:0; }
        .ti-name { font-size:11.5px; font-weight:700; color:var(--text2); }
        .ti-price { font-size:11.5px; font-weight:800; color:var(--text); font-family:'JetBrains Mono',monospace; }
        .ti-chg { font-size:10.5px; font-weight:700; padding:1px 6px; border-radius:5px; }
        .ti-up   { color:var(--green-dark); background:rgba(22,163,74,.1); }
        .ti-dn   { color:var(--red-dark);   background:rgba(220,38,38,.1); }

        /* ── Action Buttons ── */
        .actions { display:flex; gap:10px; margin-bottom:20px; position:relative; z-index:1; animation:fadeUp .5s .18s both; }
        .action-btn { flex:1; background:var(--surface); border:1.5px solid var(--border); border-radius:var(--rl); padding:17px 8px 15px; display:flex; flex-direction:column; align-items:center; gap:9px; cursor:pointer; transition:all .25s cubic-bezier(.4,0,.2,1); box-shadow:0 2px 10px rgba(27,63,238,.06); position:relative; overflow:hidden; text-decoration:none; }
        .action-btn::before { content:''; position:absolute; inset:0; opacity:0; transition:opacity .3s; }
        .action-btn:hover { transform:translateY(-4px); box-shadow:0 14px 30px rgba(76,110,245,.16); border-color:var(--border2); }
        .action-btn:hover::before { opacity:1; }
        .action-btn:active { transform:translateY(-1px) scale(0.97); }

        .action-btn:nth-child(1) .action-icon { background:linear-gradient(135deg,#E6F9F0,#B9F6CA); color:#15803d; }
        .action-btn:nth-child(2) .action-icon { background:linear-gradient(135deg,#FFF3E0,#FFE0B2); color:#c2410c; }
        .action-btn:nth-child(3) .action-icon { background:linear-gradient(135deg,#EEF0FF,#DDE2FF); color:var(--blue-light); }
        .action-btn:nth-child(1):hover .action-icon { background:linear-gradient(135deg,#22c55e,#16a34a); color:white; }
        .action-btn:nth-child(2):hover .action-icon { background:linear-gradient(135deg,#f97316,#ea580c); color:white; }
        .action-btn:nth-child(3):hover .action-icon { background:linear-gradient(135deg,var(--blue-light),var(--blue-mid)); color:white; }

        .action-icon { width:50px;height:50px; border-radius:15px; display:flex; align-items:center; justify-content:center; transition:all .3s ease; position:relative; z-index:1; }
        .action-btn:hover .action-icon { transform:scale(1.1); box-shadow:0 6px 18px rgba(76,110,245,.22); }
        .action-label { font-size:12px; font-weight:700; color:var(--text2); transition:color .3s; z-index:1; position:relative; letter-spacing:-.1px; }
        .action-btn:hover .action-label { color:var(--blue-light); }

        /* ── Market Section Header & Tabs ── */
        .market-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; position:relative; z-index:1; animation:fadeUp .5s .24s both; }
        .market-head h2 { font-size:17px; font-weight:800; color:var(--text); letter-spacing:-.3px; }
        .view-all { font-size:12px; color:var(--blue-light); text-decoration:none; font-weight:700; padding:4px 10px; border-radius:8px; background:rgba(76,110,245,.07); border:1px solid rgba(76,110,245,.15); transition:all .2s; }
        .view-all:hover { background:rgba(76,110,245,.14); }

        /* Filter Tabs */
        .filter-tabs { display:flex; gap:6px; margin-bottom:14px; position:relative; z-index:1; animation:fadeUp .5s .26s both; }
        .ftab { padding:6px 14px; border-radius:20px; font-size:12px; font-weight:700; cursor:pointer; transition:all .2s; border:1.5px solid var(--border); background:var(--surface); color:var(--text3); user-select:none; }
        .ftab:hover { border-color:var(--border2); color:var(--text2); }
        .ftab.active { background:var(--blue); color:white; border-color:var(--blue); box-shadow:0 4px 14px rgba(27,63,238,.25); }

        /* ── Rates Container ── */
        .rates-container { display:flex; flex-direction:column; gap:7px; position:relative; z-index:1; animation:fadeUp .5s .28s both; }

        /* ── Rate Item ── */
        .rate-item { display:flex; align-items:center; padding:12px 13px; background:var(--surface); border-radius:var(--rl); transition:all .25s cubic-bezier(.4,0,.2,1); box-shadow:0 2px 10px rgba(27,63,238,.05); cursor:pointer; border:1.5px solid transparent; position:relative; overflow:hidden; }
        /* Flash overlay */
        .rate-item::after { content:''; position:absolute; inset:0; border-radius:var(--rl); opacity:0; pointer-events:none; transition:opacity .1s; }
        .rate-item.flash-up::after   { background:rgba(34,197,94,.08);  opacity:1; }
        .rate-item.flash-dn::after   { background:rgba(239,68,68,.08);  opacity:1; }
        .rate-item:hover { transform:translateX(4px); box-shadow:0 8px 24px rgba(27,63,238,.10); border-color:var(--border); background:var(--surface2); }
        .rate-item:active { transform:translateX(2px) scale(.99); }

        /* Rank badge */
        .coin-rank { font-size:10px; font-weight:800; color:var(--text3); width:18px; text-align:center; margin-right:8px; flex-shrink:0; font-family:'JetBrains Mono',monospace; }

        .coin-icon { width:42px;height:42px; border-radius:50%; margin-right:11px; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:16px; color:white; flex-shrink:0; box-shadow:0 4px 12px rgba(0,0,0,.14); transition:transform .3s; position:relative; }
        .coin-icon::after { content:''; position:absolute; inset:-1px; border-radius:50%; border:1.5px solid rgba(255,255,255,.28); }
        .rate-item:hover .coin-icon { transform:scale(1.1) rotate(-5deg); }

        .coin-info { flex:1; min-width:0; }
        .coin-name { font-size:14px; font-weight:700; color:var(--text); letter-spacing:-.1px; }
        .coin-ticker { font-size:11px; color:var(--text3); font-weight:600; letter-spacing:.4px; margin-top:1px; }

        /* Volume bar */
        .vol-bar-wrap { width:36px; margin-right:10px; flex-shrink:0; }
        .vol-label { font-size:9.5px; font-weight:600; color:var(--text3); text-transform:uppercase; letter-spacing:.4px; margin-bottom:4px; }
        .vol-track { height:4px; background:var(--border); border-radius:2px; overflow:hidden; }
        .vol-fill { height:100%; border-radius:2px; transition:width .6s ease; }

        /* Sparkline */
        .mini-chart { width:64px;height:32px; margin-right:10px; flex-shrink:0; }

        .rate-value { text-align:right; flex-shrink:0; }
        .rate-price { font-size:14px; font-weight:800; color:var(--text); letter-spacing:-.3px; font-family:'JetBrains Mono',monospace; }
        .rate-change { font-size:11px; font-weight:700; padding:2px 7px; border-radius:5px; display:inline-block; margin-top:3px; }
        .positive { color:var(--green-dark); background:rgba(22,163,74,.10); }
        .negative { color:var(--red-dark);   background:rgba(220,38,38,.10); }

        /* ── Market Mood Bar ── */
        .mood-bar { background:var(--surface); border:1.5px solid var(--border); border-radius:var(--rl); padding:14px 16px; margin-bottom:18px; position:relative; z-index:1; animation:fadeUp .5s .2s both; }
        .mood-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
        .mood-title { font-size:12px; font-weight:700; color:var(--text2); letter-spacing:-.1px; }
        .mood-score { font-size:12px; font-weight:800; color:var(--amber); background:rgba(245,158,11,.1); padding:3px 10px; border-radius:20px; }
        .mood-track { height:8px; background:linear-gradient(90deg,#ef4444 0%,#f97316 25%,#f59e0b 50%,#84cc16 75%,#22c55e 100%); border-radius:4px; position:relative; overflow:visible; }
        .mood-needle { position:absolute; top:50%; transform:translate(-50%,-50%); width:14px;height:14px; border-radius:50%; background:white; border:3px solid var(--amber); box-shadow:0 2px 6px rgba(0,0,0,.18); transition:left .8s cubic-bezier(.34,1.56,.64,1); }
        .mood-labels { display:flex; justify-content:space-between; margin-top:6px; }
        .mood-labels span { font-size:10px; font-weight:600; color:var(--text3); }

        /* ── Logout ── */
        .logout-btn { margin-top:22px; width:100%; padding:14px; background:var(--surface); color:var(--red); border:1.5px solid #fee2e2; border-radius:var(--rm); font-weight:700; font-size:14px; cursor:pointer; transition:all .25s cubic-bezier(.4,0,.2,1); position:relative; z-index:1; animation:fadeUp .5s .4s both; font-family:'Inter',inherit; letter-spacing:-.1px; }
        .logout-btn:hover { background:#fff1f2; border-color:#fecaca; transform:translateY(-2px); box-shadow:0 6px 16px rgba(239,68,68,.12); }
        .logout-btn:active { transform:translateY(0) scale(.98); }

        ::-webkit-scrollbar { width:4px; }
        ::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }

        @keyframes fadeUp   { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
        @keyframes fadeDown { from{opacity:0;transform:translateY(-14px)} to{opacity:1;transform:translateY(0)} }
        @keyframes pulse    { 0%,100%{opacity:1} 50%{opacity:.5} }
        #greeting { transition:all .3s ease; }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="container">

        <!-- Header -->
        <div class="header">
            <a href="/" class="logo">
                <svg class="logo-icon" viewBox="0 0 32 32" fill="none">
                    <path d="M16 2L4 9v14l12 7 12-7V9L16 2z" stroke="#4c6ef5" stroke-width="2.2" fill="none"/>
                    <path d="M16 8v16M10 12l6-4 6 4" stroke="#4c6ef5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

            <div class="header-right">
                <div class="live-pill"><div class="live-dot"></div>Live</div>

                    <svg id="eyeClosed" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>

                <span class="action-label">Deposit</span>

                <div class="action-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg></div>

        <button class="logout-btn" onclick="handleLogout()">Logout Account</button>

    <script>
        // =====================================================
        // BACKEND CODE — UNTOUCHED
        // =====================================================
        const supabaseUrl = 'https://catyifsdiesojvcpsldm.supabase.co';
        const supabaseKey = 'sb_publishable_nbjquhB25jTJ9-dgI-LAcg_fc2k4wzg';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function checkUser() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) { window.location.href = 'signin.html'; return; }
            const user = session.user;
            const name = user.user_metadata.full_name || user.email;
            document.getElementById('greeting').textContent = `Welcome back, ${name.split(' ')[0]} 👋`;
            const { data: profile, error } = await _supabase
                .from('profiles').select('balance').eq('id', user.id).single();
            let realBalance = 0;
            if (profile) realBalance = profile.balance;
            renderDashboard(realBalance);
        }

        async function handleLogout() {
            await _supabase.auth.signOut();
            window.location.href = 'signin.html';
        }

        function renderDashboard(userBalance) {
            const balanceAmountEl = document.getElementById('balanceAmount');
            const balanceChangeEl = document.getElementById('balanceChange');
            const realBalanceText = '$' + userBalance.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

            // Animated counter
            animateCounter(balanceAmountEl, userBalance, realBalanceText);
            balanceChangeEl.textContent = `+2.59% (24h)`;

            const rates = [
                { name:"US Dollar",      ticker:"USD",  icon:"$", price:1.00,     change:0.02,  color:"#22c55e", rank:null,  vol:0.30 },
                { name:"British Pound",  ticker:"GBP",  icon:"£", price:1.30,     change:0.15,  color:"#3b82f6", rank:null,  vol:0.20 },
                { name:"Bitcoin",        ticker:"BTC",  icon:"₿", price:67842.21, change:2.59,  color:"#f7931a", rank:1,     vol:1.00 },
                { name:"Ethereum",       ticker:"ETH",  icon:"◆", price:3312.18,  change:1.45,  color:"#6366f1", rank:2,     vol:0.72 },
                { name:"Tether",         ticker:"USDT", icon:"₮", price:1.00,     change:0.01,  color:"#26a17b", rank:3,     vol:0.85 },
                { name:"Solana",         ticker:"SOL",  icon:"S", price:142.85,   change:4.32,  color:"#14f195", rank:5,     vol:0.48 },
                { name:"Cardano",        ticker:"ADA",  icon:"A", price:0.48,     change:-1.24, color:"#0033ad", rank:8,     vol:0.22 },
                { name:"XRP",            ticker:"XRP",  icon:"X", price:0.62,     change:3.18,  color:"#23292f", rank:6,     vol:0.41 },
                { name:"Polkadot",       ticker:"DOT",  icon:"D", price:7.24,     change:-0.85, color:"#e6007a", rank:14,    vol:0.18 },
                { name:"Chainlink",      ticker:"LINK", icon:"L", price:14.67,    change:5.41,  color:"#375bd2", rank:12,    vol:0.27 }
            ];

            // Eye Toggle Logic
            document.getElementById('eyeBtn').onclick = function() {
                const amount = document.getElementById('balanceAmount');
                if (amount.textContent === '•••••••') {
                    amount.textContent = realBalanceText;
                    document.getElementById('eyeOpen').style.display = 'block';
                    document.getElementById('eyeClosed').style.display = 'none';
                } else {
                    amount.textContent = '•••••••';
                    document.getElementById('eyeOpen').style.display = 'none';
                    document.getElementById('eyeClosed').style.display = 'block';
                }
            };

            // Store for filter
            window._ratesData = rates;
            renderRates(rates);
            buildTicker(rates);
            drawBalanceSparkline();
        }

        checkUser();

        // =====================================================
        // UI HELPERS (additive — no backend logic changed)
        // =====================================================

        // Seeded LCG pseudo-random for consistent sparklines
        function seededRand(seed) {
            let s = seed;
            return function() {
                s = (s * 1664525 + 1013904223) & 0xffffffff;
                return (s >>> 0) / 0xffffffff;
            };
        }

        // Generate a realistic-looking crypto sparkline path (jagged, not smooth)
        function genSparklinePath(isPositive, seed, w, h) {
            const rand = seededRand(seed);
            const pts = 16;
            const xStep = w / (pts - 1);
            // trend: positive = down in SVG y = up visually
            const trend = isPositive ? -(h * 0.38) / pts : (h * 0.38) / pts;
            let y = isPositive ? h * 0.72 : h * 0.28;
            const points = [];
            for (let i = 0; i < pts; i++) {
                const x = i * xStep;
                const noise = (rand() - 0.48) * (h * 0.30);
                y = Math.max(3, Math.min(h - 3, y + trend + noise));
                points.push([x, y]);
            }
            const d = points.map((p, i) => (i === 0 ? `M${p[0].toFixed(1)},${p[1].toFixed(1)}` : `L${p[0].toFixed(1)},${p[1].toFixed(1)}`)).join(' ');
            // area fill
            const area = d + ` L${w},${h} L0,${h} Z`;
            const last = points[points.length - 1];
            return { d, area, last };
        }

        // Animated balance counter
        function animateCounter(el, target, finalText) {
            if (target === 0) { el.textContent = finalText; return; }
            const dur = 1200, fps = 60, steps = dur / (1000 / fps);
            let i = 0;
            const tick = () => {
                i++;
                const progress = Math.min(i / steps, 1);
                const ease = 1 - Math.pow(1 - progress, 3);
                const val = target * ease;
                el.textContent = '$' + val.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                if (progress < 1) requestAnimationFrame(tick);
                else el.textContent = finalText;
            };
            requestAnimationFrame(tick);
        }

        // Flash a rate item green/red briefly
        function flashItem(el, isPositive) {
            const cls = isPositive ? 'flash-up' : 'flash-dn';
            el.classList.add(cls);
            setTimeout(() => el.classList.remove(cls), 500);
        }

        // Build ticker strip (doubled for seamless loop)
        function buildTicker(rates) {
            const cryptos = rates.filter(r => r.rank !== null);
            const track = document.getElementById('tickerTrack');
            const makeItem = r => {
                const up = r.change >= 0;
                return `<div class="ticker-item">
                    <div class="ti-dot" style="background:${r.color}"></div>
                    <span class="ti-name">${r.ticker}</span>
                    <span class="ti-price">$${r.price.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</span>
                    <span class="ti-chg ${up?'ti-up':'ti-dn'}">${up?'+':''}${r.change}%</span>
                </div>`;
            };
            const html = [...cryptos,...cryptos].map(makeItem).join('');
            track.innerHTML = html;
        }

        // Render rate items with filter support
        function renderRates(rates) {
            const container = document.getElementById('ratesList');
            container.innerHTML = '';
            rates.forEach((rate, index) => {
                const isPositive = rate.change >= 0;
                const changeClass = isPositive ? 'positive' : 'negative';
                const changePrefix = isPositive ? '+' : '';
                const color = isPositive ? '#22c55e' : '#ef4444';
                const { d, area, last } = genSparklinePath(isPositive, index * 137 + 42, 64, 32);
                const volPct = Math.round(rate.vol * 100);
                const rankHtml = rate.rank ? `<div class="coin-rank">#${rate.rank}</div>` : `<div class="coin-rank" style="opacity:0">#</div>`;
                const priceStr = rate.price >= 1000
                    ? '$' + rate.price.toLocaleString('en-US', {minimumFractionDigits:2,maximumFractionDigits:2})
                    : '$' + rate.price.toFixed(rate.price < 1 ? 4 : 2);

                const item = document.createElement('div');
                item.className = 'rate-item';
                item.style.cssText = `animation:fadeUp 0.45s ease-out ${0.05 * index}s both;opacity:0`;
                item.innerHTML = `
                    ${rankHtml}
                    <div class="coin-icon" style="background:${rate.color}">${rate.icon}</div>
                    <div class="coin-info">
                        <div class="coin-name">${rate.name}</div>
                        <div class="coin-ticker">${rate.ticker}</div>
                    </div>
                    <div class="vol-bar-wrap">
                        <div class="vol-label">Vol</div>
                        <div class="vol-track"><div class="vol-fill" style="width:0%;background:${color}" data-pct="${volPct}"></div></div>
                    </div>
                    <svg class="mini-chart" viewBox="0 0 64 32" preserveAspectRatio="none">
                        <defs><linearGradient id="sg${index}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity=".18"/><stop offset="100%" stop-color="${color}" stop-opacity="0"/></linearGradient></defs>
                        <path d="${area}" fill="url(#sg${index})"/>
                        <path d="${d}" fill="none" stroke="${color}" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                        <circle cx="${last[0].toFixed(1)}" cy="${last[1].toFixed(1)}" r="2.5" fill="${color}"/>
                    </svg>
                    <div class="rate-value">
                        <div class="rate-price">${priceStr}</div>
                        <div class="rate-change ${changeClass}">${changePrefix}${rate.change}%</div>
                    </div>`;

                container.appendChild(item);

                // Animate volume bars after item enters
                setTimeout(() => {
                    const fill = item.querySelector('.vol-fill');
                    if (fill) fill.style.width = fill.dataset.pct + '%';
                    flashItem(item, isPositive);
                }, 80 + index * 50);
            });
        }

        // Draw the balance card sparkline with a realistic canvas-like SVG
        function drawBalanceSparkline() {
            const svg = document.getElementById('balanceSparkline');
            const w = 140, h = 55;
            const { d, area } = genSparklinePath(true, 999, w, h);
            svg.innerHTML = `
                <defs>
                    <linearGradient id="bsg" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stop-color="#34d399" stop-opacity=".28"/>
                        <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
                    </linearGradient>
                </defs>
                <path d="${area}" fill="url(#bsg)"/>
                <path d="${d}" fill="none" stroke="#34d399" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="${w}" cy="${(function(){const rand=seededRand(999);let y=h*.72;const tr=-(h*.38)/16;for(let i=0;i<15;i++){const n=(rand()-.48)*(h*.30);y=Math.max(3,Math.min(h-3,y+tr+n));}return y.toFixed(1)})()}" r="4.5" fill="#34d399"/>
                <circle cx="${w}" cy="${(function(){const rand=seededRand(999);let y=h*.72;const tr=-(h*.38)/16;for(let i=0;i<15;i++){const n=(rand()-.48)*(h*.30);y=Math.max(3,Math.min(h-3,y+tr+n));}return y.toFixed(1)})()}" r="8" fill="rgba(52,211,153,.22)"/>`;
        }

        // Filter Tabs
        document.querySelectorAll('.ftab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.ftab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                const f = tab.dataset.filter;
                if (!window._ratesData) return;
                let filtered = window._ratesData;
                if (f === 'gainers') filtered = window._ratesData.filter(r => r.change > 0).sort((a,b) => b.change - a.change);
                if (f === 'losers')  filtered = window._ratesData.filter(r => r.change < 0).sort((a,b) => a.change - b.change);
                renderRates(filtered);
            });
        });

        // Animate market mood needle on load
        setTimeout(() => {
            const needle = document.getElementById('moodNeedle');
            if (needle) needle.style.left = '64%';
        }, 600);
    </script>
