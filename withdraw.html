<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw - Solvra</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: #f0f2f5; 
            color: #0f172a; 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
        }
        
        .container { 
            width: 100%; 
            max-width: 400px; 
            background: #f8f9fc; 
            min-height: 100vh; 
            padding: 20px; 
            position: relative;
        }

        /* Header */
        .header { 
            display: flex; 
            align-items: center; 
            gap: 12px;
            margin-bottom: 24px; 
        }
        
        .back-btn {
            background: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            color: #0f172a;
            text-decoration: none;
        }

        h1 { font-size: 20px; font-weight: 700; }

        /* Balance Preview */
        .balance-preview {
            background: white;
            padding: 16px;
            border-radius: 18px;
            margin-bottom: 24px;
            border: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .balance-label { color: #64748b; font-size: 13px; font-weight: 500; }
        .balance-val { font-weight: 700; color: #4c6ef5; }

        /* Form Styling */
        .form-group { margin-bottom: 20px; }
        
        label { 
            display: block; 
            font-size: 13px; 
            font-weight: 600; 
            color: #475569; 
            margin-bottom: 8px; 
            margin-left: 4px;
        }

        .input-wrapper {
            position: relative;
            background: white;
            border-radius: 14px;
            border: 1.5px solid #e2e8f0;
            transition: all 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: #4c6ef5;
            box-shadow: 0 0 0 4px rgba(76, 110, 245, 0.1);
        }

        input, select {
            width: 100%;
            padding: 14px 16px;
            border: none;
            background: transparent;
            font-size: 15px;
            font-weight: 500;
            outline: none;
            color: #0f172a;
            -webkit-appearance: none;
        }

        .max-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(76, 110, 245, 0.1);
            color: #4c6ef5;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
        }

        /* Warning Box */
        .warning-box {
            background: #fff7ed;
            border: 1px solid #ffedd5;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 24px;
            display: flex;
            gap: 10px;
        }

        .warning-box p {
            font-size: 12px;
            color: #9a3412;
            line-height: 1.5;
        }

        /* Withdrawal Details */
        .details-card {
            background: #f1f5f9;
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 24px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 8px;
        }

        .detail-row:last-child { margin-bottom: 0; }
        .detail-label { color: #64748b; }
        .detail-value { font-weight: 600; color: #0f172a; }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: #4c6ef5;
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(76, 110, 245, 0.2);
        }

        .submit-btn:hover { background: #3b5bdb; transform: translateY(-1px); }
        .submit-btn:active { transform: translateY(0); }

        /* Dropdown arrow custom */
        .select-wrapper::after {
            content: '▼';
            font-size: 10px;
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="dashboard.html" class="back-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            </a>
            <h1>Withdraw Crypto</h1>
        </div>

        <div class="balance-preview">
            <span class="balance-label">Available Balance</span>
            <span class="balance-val" id="displayBalance">$0.00</span>
        </div>

        <form id="withdrawForm">
            <!-- Asset Selection -->
            <div class="form-group">
                <label>Select Asset</label>
                <div class="input-wrapper select-wrapper">
                    <select id="asset" required>
                        <option value="USDT">Tether (USDT)</option>
                        <option value="USDC">USD Coin (USDC)</option>
                        <option value="BTC">Bitcoin (BTC)</option>
                        <option value="ETH">Ethereum (ETH)</option>
                        <option value="SOL">Solana (SOL)</option>
                        <option value="BNB">Binance Coin (BNB)</option>
                        <option value="XRP">XRP (XRP)</option>
                        <option value="ADA">Cardano (ADA)</option>
                        <option value="DOT">Polkadot (DOT)</option>
                        <option value="LINK">Chainlink (LINK)</option>
                    </select>
                </div>
            </div>

            <!-- Network Selection -->
            <div class="form-group">
                <label>Network</label>
                <div class="input-wrapper select-wrapper">
                    <select id="network" required>
                        <option value="ERC20">Ethereum (ERC20)</option>
                        <option value="TRC20">Tron (TRC20)</option>
                        <option value="BEP20">BNB Smart Chain (BEP20)</option>
                        <option value="SOL">Solana</option>
                        <option value="POLYGON">Polygon</option>
                        <option value="ARB">Arbitrum One</option>
                        <option value="OPT">Optimism</option>
                        <option value="AVAX">Avalanche C-Chain</option>
                        <option value="BASE">Base Network</option>
                        <option value="BTC">Bitcoin Network</option>
                    </select>
                </div>
            </div>

            <!-- Address Input -->
            <div class="form-group">
                <label>Wallet Address</label>
                <div class="input-wrapper">
                    <input type="text" id="address" placeholder="Long press to paste" required>
                </div>
            </div>

            <!-- Amount Input -->
            <div class="form-group">
                <label>Withdrawal Amount</label>
                <div class="input-wrapper">
                    <input type="number" id="amount" placeholder="0.00" step="0.01" required>
                    <button type="button" class="max-btn" onclick="setMax()">MAX</button>
                </div>
            </div>

            <div class="warning-box">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9a3412" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                <p>Ensure the network matches your destination wallet address, or assets may be lost forever.</p>
            </div>

            <div class="details-card">
                <div class="detail-row">
                    <span class="detail-label">Network Fee</span>
                    <span class="detail-value" id="feeText">$0.80</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">You will receive</span>
                    <span class="detail-value" id="receiveText">0.00</span>
                </div>
            </div>

            <button type="submit" class="submit-btn">Confirm Withdrawal</button>
        </form>
    </div>

    <script>
        const supabaseUrl = 'https://catyifsdiesojvcpsldm.supabase.co';
        const supabaseKey = 'sb_publishable_nbjquhB25jTJ9-dgI-LAcg_fc2k4wzg';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let userBalance = 0;
        const fixedFee = 0.80;

        async function init() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) {
                window.location.href = 'signin.html';
                return;
            }

            const { data: profile } = await _supabase
                .from('profiles')
                .select('balance')
                .eq('id', session.user.id)
                .single();

            if (profile) {
                userBalance = profile.balance;
                document.getElementById('displayBalance').textContent = `$${userBalance.toLocaleString()}`;
            }
        }

        function setMax() {
            // Fill balance minus a small fee buffer if needed
            const amountInput = document.getElementById('amount');
            amountInput.value = userBalance > fixedFee ? (userBalance - fixedFee).toFixed(2) : userBalance;
            updateReceiveAmount();
        }

        function updateReceiveAmount() {
            const amount = parseFloat(document.getElementById('amount').value) || 0;
            const asset = document.getElementById('asset').value;
            const receive = amount > 0 ? (amount).toFixed(2) : "0.00";
            document.getElementById('receiveText').textContent = `${receive} ${asset}`;
        }

        document.getElementById('amount').oninput = updateReceiveAmount;
        document.getElementById('asset').onchange = updateReceiveAmount;

        document.getElementById('withdrawForm').onsubmit = async (e) => {
            e.preventDefault();
            const amount = parseFloat(document.getElementById('amount').value);

            if (amount > userBalance) {
                alert("Insufficient balance!");
                return;
            }

            alert("Withdrawal Request Submitted! It will be processed shortly.");
            // Here you would typically insert a record into a 'withdrawals' table in Supabase
        };

        init();
    </script>
</body>
</html>
